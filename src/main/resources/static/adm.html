<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Brinquedos - Administração</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <nav class="sidebar">
            <div class="logo"><img src="images/logo.png" alt="Logo HappyKids"></div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="categorias.html">Catálogo</a></li>
                <li class="active"><a href="adm.html">Administração</a></li> 
                <li><a href="sobre.html">Sobre a equipe</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>HappyKids</h1> <p>Administração :: catálogo de brinquedos</p>
            </header>

            <section class="form-section">
                <h2 id="tituloFormulario">Novo Brinquedo</h2>
                <div class="form-grid">
                    <!-- Campos Ocultos -->
                    <input type="hidden" id="brinquedoId">
                    <input type="hidden" id="imagemUrl"> 
                    
                    <input type="text" id="codigo" placeholder="Código do Brinquedo">
                    <input type="text" id="descricao" placeholder="Descrição do Brinquedo">
                    
                    <select id="categoria">
                        <option value="">A carregar categorias...</option>
                    </select>
                    
                    <input type="text" id="marca" placeholder="Marca">
                    <input type="number" id="valor" placeholder="Valor (R$)" step="0.01">
                    
                    <!-- Campo de Imagem -->
                    <div style="display: flex; flex-direction: column; gap: 5px; border: 1px solid #ddd; padding: 5px; border-radius: 4px;">
                        <label style="font-size: 11px; font-weight: bold;">FOTO DO BRINQUEDO:</label>
                        <input type="file" id="imagemArquivo" accept="image/*">
                    </div>
                    
                    <div style="grid-column: span 3; display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="destaque" style="width: auto;">
                        <label for="destaque">Destacar na Home Page</label>
                    </div>

                    <textarea id="detalhes" placeholder="Detalhes do brinquedo..." style="grid-column: span 3; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;"></textarea>

                    <button class="btn-save" id="btnSalvar" onclick="salvar()">SALVAR DADOS</button>
                    <button class="btn-save" id="btnCancelar" onclick="cancelarEdicao()" style="display: none; background: #95a5a6; grid-column: span 3;">CANCELAR EDIÇÃO</button>
                </div>
            </section>

            <section class="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>FOTO</th>
                            <th>CÓDIGO</th>
                            <th>DESCRIÇÃO</th>
                            <th>CATEGORIA</th>
                            <th>VALOR</th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="listaBrinquedos"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
